apiVersion: apps/v1
kind: Deployment
metadata:
  labels:
    app: diabetes-api
  name: diabetes-api

spec:
  replicas: 2

  selector:
    matchLabels:
      app: diabetes-api

  template:
    metadata:
      labels:
        app: diabetes-api

    spec:
      containers:
      - name: fastapi
        image: dkutti/diabetes-model:latest
        imagePullPolicy: Always

        ports:
        - containerPort: 8000

---
apiVersion: v1
kind: Service

metadata:
  name: diabetes-api-service

spec:
  selector:
    app: diabetes-api

  ports:
  - protocol: TCP
    port: 80
    targetPort: 8000

  type: LoadBalancer